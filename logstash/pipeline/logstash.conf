# Pipeline Logstash : reçoit les logs JSON de Spring Boot via TCP,
# les transmet à Elasticsearch pour indexation.

input {
  tcp {
    port => 5044
    # codec json_lines : chaque ligne reçue est un objet JSON (format LogstashEncoder)
    codec => json_lines
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    # Un index par jour pour faciliter la rotation et la recherche dans Kibana
    index => "spring-logs-%{+YYYY.MM.dd}"
  }
  # Affichage dans les logs Logstash pour faciliter le débogage
  stdout {
    codec => rubydebug
  }
}
