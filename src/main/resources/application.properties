spring.application.name=library

# Port du serveur — libère le 8080 pour le front Vite
server.port=8082

# ── Base de données MySQL (kc-compose) ────────────────────────────────────────
# Le kc-compose lance MySQL sur le port 3306 avec l'utilisateur keycloak/keycloak.
# L'option createDatabaseIfNotExist=true crée library_db automatiquement si absente.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/library_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Europe/Paris}
spring.datasource.username=${DB_USERNAME:keycloak}
spring.datasource.password=${DB_PASSWORD:keycloak}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate : met à jour le schéma automatiquement
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── Keycloak OAuth2 Resource Server ───────────────────────────────────────────
# issuer-uri : Spring Boot récupère automatiquement la clé publique via OpenID Connect.
# Keycloak est exposé sur le port 8090 (voir kc-compose/docker-compose.yml).
# IMPORTANT : Keycloak doit être démarré avant le lancement de l'application.
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8090/realms/library-realm
